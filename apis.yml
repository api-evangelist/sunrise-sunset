aid: sunrise-sunset
name: Sunrise Sunset
description: >
  Free REST API providing sunrise, sunset, solar noon, day length, and
  civil, nautical, and astronomical twilight times for any geographic
  location and date. No API key or account required; attribution to
  sunrise-sunset.org is required. A single GET request to
  https://api.sunrise-sunset.org/json with a latitude, longitude, and
  optional date returns all solar time data for that location.
